l_english:
  #intro focuses
  fbh_a_war_lost:0 "A war lost"
  fbh_a_war_lost_desc:0 "Battered, Bloodied, the Brotherhood managed just barely to limp out of California but without their Elder."
  fbh_exodus_in_america:0 "Exodus in America"
  fbh_exodus_in_america_desc:0 "After escaping east they eventually ended up on the peninsula."
  fbh_broken_steel:0 "Broken Steel"
  fbh_broken_steel_desc:0 "Lacking most of their armour, lost to either attrition of the long marching hours or in fights with foolish foes."
  fbh_paradise_lost:0 "Paradise Lost"
  fbh_paradise_lost_desc:0 "The loss of the Lost Hills Bunker also weighed on them, over 200 years of development now in the hands of the NCR.'"
  #eco focuses
  fbh_built_from_scratch:0 "Built From Scratch"
  fbh_built_from_scratch_desc:0 "The Brotherhood will require lots of new material to rebuild and then we can decide on the correct way forward."
  fbh_brick_by_brick:0 "Brick By Brick"
  fbh_brick_by_brick_desc:0 "With the major cities begining development we should look for other areas of high interest to build up."
  fbh_fortified_resolve:0 "Fortifed Resolve"
  fbh_fortified_resolve_desc:0 "As more of our people make it out East combined with selective local recruitment we can begin to manufacture more resources."
  #first army tree
  fbh_doctrinal_thoughts:0 "Doctrinal Thoughts"
  fbh_doctrinal_thoughts_desc:0 "We will need to decide quickly what kind of army we will want to field, Power armour and Robots are our best choices but we are flexible."
  fbh_thinking_armour:0 "Thinking of Armour"
  fbh_thinking_armour_desc:0 "Should we follow through with continued Power Armour usage we should put what we alrady know into designing upgrades for our current suits."
  fbh_readied_men:0 "Readied Men"
  fbh_readied_men_desc:0 "We can always use more men a shortage of hands has always been our downfall."
  #politics
  fbh_chains_bind:0 "The Chains That Bind"
  fbh_chains_bind_desc:0 "In the disarray and with no Elder people have just been giving orders whenever it's necessary but we'll need decisive leadership from now on."
  fbh_unclear_path:0 "Unclear Path"
  fbh_unclear_path_desc:0 "No one has been able to agree on a direction for the Chapter especially Llwyd."
  fbh_untold_potential:0 "Untold Potential"
  fbh_untold_potential_desc:0 "We have a habbit of being cut short though but not this time."
  fbh_bigger_fish:0 "Bigger Fish To Fry"
  fbh_bigger_fish_desc:0 "Regardless of what's happened here recently, we are ready to commit to path."
  #volunteer focuses
  fbh_large_force:0 "Large Force"
  fbh_large_force_desc:0 "Sending a large force to our allies will be a better use of our manpower and material."
  fbh_elite_force:0 "Elite Forces"
  fbh_elite_force_desc:0 "Sending a few of our best soldiers with the best gear will prove our might far better."
  fbh_doctrine_training:0 "Doctrine Training"
  fbh_doctrine_training_desc:0 "Now that we've had time to practice our preferred method of intervention we can reflect upon the lessons we've learned and adapt."
  #air force focuses
  fbh_canaveral_airbase:0 "Cape Canaveral Airbase"
  fbh_canaveral_airbase_desc:0 "While this airbase used to be for the launching of rockets into space the terminals here should provide valuable aircraft designs and data."
  fbh_volare:0 "Volare"
  fbh_volare_desc:0 "The run down airbase was a valuable find as it had several wings of pre war advanced aircraft and schematics for more basic designs but no equipment to help us design and build small aircraft."
  #doctrine trees 
  fbh_steel_resurgence:0 "Steel Resurgence"
  fbh_steel_resurgence_desc:0 "Now that we have dealt with our decrepit industry, doctrine and political turmoil we can turn towards foreign issues and technological research."
  fbh_paladin_supremacy:0 "Paladin Supremacy"
  fbh_paladin_supremacy_desc:0 "We have always leaned on our elite fighting force of Paladins, their power armour combined with heavy firepower is how we should continue."
  fbh_walking_tanks:0 "Walking Tanks."
  fbh_walking_tanks_desc:0 "[FBH.GetLeader] has ordered us to upgrade our current suits of power armour in in the meantime until we can develop newer designs"
  fbh_correct_attire:0 "Correct Attire"
  fbh_correct_attire_desc:0 "With production of new suits underway we will need to accelerate our production to outfit even a small expedition with armour."
  fbh_expert_training:0 "Training Regimen"
  fbh_expert_training_desc:0 "We will need a lot more experience to shape our forces so we will institute basic part time trianing so that we have a gradual accumulation of knowledge at all times."
  fbh_plated_security:0 "Autonamous Paladins"
  fbh_plated_security_desc:0 "When we discovered the abandoned Florida Brotherhood's original bunker, [FBH.GetLeader], ordered it searched this was the result of that search, brothers that never get tired or faulter."
  fbh_second_skins:0 "Second Skins"
  fbh_second_skins_desc:0 "There was some destroyed humanoid machines around the area, usually in areas with dead brothers, we thinkt he armour they wore could have some kind of benefit to our forces."
  fbh_robotic_menace:0 "Robotic Menace"
  fbh_robotic_menace_desc:0 "With the choice to develop robots instead of power armour we have searched tirelessly for new information, leading to the discovery of a RobCo plant housing various experimental designs."
  fbh_systems_online:0 "Systems Online"
  fbh_systems_online_desc:0 "In addition to the plans for more advanced robots we had found previously there was the schematics for common pre-war designs in various repair shops around the peninsula."
  fbh_swamp_recovery:0 "Swamp Recovery"
  fbh_swamp_recovery_desc:0 "There were numerous robots sinking into the swamps when we arrived, much larger than anything else we'd ever seen, we gave them a chance and recovered them."
  fbh_help_aplenty:0 "A Helping Handy"
  fbh_help_aplenty_desc:0 "We've found quite a few roaming Mr.Handy models looking for their previous owners, blisfully unaware of the nuclear war, we've put them to better use along with some recovered Quadrapeds."
  fbh_artificial_paladins:0 "Artificial Paladins"
  fbh_artificial_paladins_desc:0 "With fewer trained personnel and even fewer suits of power armour to go around we could always resort to putting them into robobrains to act as field commanders."
  fbh_clanker_utility:0 "Clanker Army"
  fbh_clanker_utility_desc:0 "With the prevalence of the idea to use robots as our main fighting force we could also cut out the middle man and use the robots to assemble more robots."
  #ncr support tree
  fbh_growing_storm:0 "Growing Storm"
  fbh_growing_storm_desc:0 "[FBH.GetName] has been unsettled by reports from California and the Mojave chapters about growing tensions between the NCR and Caesar's Legion and will need to descide who we support but neither is good."
  fbh_more_knights:0 "More Knights"
  fbh_more_knights_desc:0 "If we start recruitment of new brothers up to the rank of Knight we can free up Paladins for more combat related duties."
  fbh_it_isnt_enough:0 "It Isn't Enough"
  fbh_it_isnt_enough_desc:0 "With mounting losses we will need to take in everybody that will hold a rifle."
  fbh_lesser_devil:0 "The Lesser Devil"
  fbh_lesser_devil_desc:0 "We have reluctantly decided to support the NCR and have sent an envoy out the California to make contact."
  fbh_ncr_negotiations:0 "NCR Negotiations"
  fbh_ncr_negotiations_desc:0 "We have agreed to pay for the return of some of our suits that either we or various chapters have lost."
  fbh_the_lost_chapter:0 "The Lost Chapter"
  fbh_the_lost_chapter_desc:0 "We've moved into the Mojave proper and have managed to hunt down some raiders that had obtained laser rifles from the chapter when they abandoned Helios 1."
  fbh_burying_warriors:0 "Buried Brothers"
  fbh_burying_warriors_desc:0 "The NCR physically buried the bodies when they took Helios but a mass grave is no resting place for them, we'll bury them properly including searching the bunker."
  fbh_mutual_benefit:0 "Unique Perspective"
  fbh_mutual_benefit_desc:0 "We have a relative abundance of manpower compared to this Mojave garrison we should trade knowledge about fighting power armour for our manpower to reinforce the defensive lines."
  fbh_steeled_defence:0 "Steel Defence"
  fbh_steeled_defence_desc:0 "Most of this land is flat open desert we'll need more extensive fortifications to prevent an overrun, we will extend our efforts in the the Mojave including refurbishing the Searchlight Airport."
  fbh_vault_dwellers:0 "The Vault Dwellers"
  fbh_vault_dwellers_desc:0 "They might be civilised and know a good amount about power armour but they're still not happy about being told to hand over the plans."
  fbh_worthwhile_worthless:0 "Worthwhile Deal"
  fbh_worthwhile_worthless_desc:0 "We've negotiated with Vault City and we'll both need advanced materials to support any upcoming war."
  fbh_extended_warranty:0 "Furter Production"
  fbh_extended_warranty_desc:0 "The current amount of material production will not suffice we will both need more."
  fbh_medical_oddballs:0 "Medically Odd"
  fbh_medical_oddballs_desc:0 "They have such advanced technology yet live next to a gang that uses venom and in a state that has deadly snakes, this could be beneficial for both of us."
  fbh_pompous_fools:0 "Backwards Scientists"
  fbh_pompous_fools_desc:0 "They may be technologically advanced yet they still justify the use of slavery on humans, we could incorprate this against abominations however."
  fbh_desert_knights:0 "The Desert Knights"
  fbh_desert_knights_desc:0 "There's quite a few people among their ranks wearing old Knight gear, it must have been the renegade chapter that was int his area, we could reorganise them into real Knights again for the Rnagers."
  fbh_like_us:0 "Like Us"
  fbh_like_us_desc:0 "The Knights at least remember how to operate suits, we could set up a basic crafting knowledge of suits to use as a support company."
  fbh_like_them:0 "Like Them"
  fbh_like_them_desc:0 "We shall need some lighter special forces equipment to outfit our Paladins, we could just learn how to develop that from the rangers."
  fbh_power_rangers:0 "Power Rangers"
  fbh_power_rangers_desc:0 "We can set them up with a few basic suits and instruct them on their use."
  fbh_united_front:0 "United Front"
  fbh_united_front_desc:0 "If we want to win this in ernest we'll have to increase production across the most important allies within the NCR that's we've already visited and ourselves, hopefully it'll be enough."
  #inbetweeney bits
  fbh_elder_return:0 "Elder Return"
  fbh_elder_return_desc:0 "We shall negotiate with the NCR directly for the return of Elder Maxson's body."
  fbh_home_sweet_home:0 "Home Sweet Home"
  fbh_home_sweet_home_desc:0 "We are ready to negotiate basing our support for the NCR from within their lands, the Lost Hills Bunker will be the perfect location."
  fbh_stat_padder:0 "Steady Infrastructure"
  fbh_stat_padder_desc:0 "The swamps of florida have never exactly been steady places to set up a self contained nation but we should be able to with massive projects to secure it."
  fbh_violet_stat_padder:0 "Logistics Win Wars"
  fbh_violet_stat_padder_desc:0 "We will need a strong supply network across the seas to support our allies, the obvious choice is transport ships but we cannot discount going by air."
  fbh_stat_capstone:0 "Sealed Armouries"
  fbh_stat_capstone_desc:0 "There are several armouries dotted around the peninsula that have been almost untouched because of their locations."
  fbh_monsters_demons:0 "Monsters... Demons..."
  fbh_monsters_demons_desc:0 "These assorted tribals and hired henchmen are worse than the NCR ever was but they can help us reclaim what is ours."
  fbh_not_quite_home:0 "Not Quite Home"
  fbh_not_quite_home_desc:0 "This isn't the Lost Hills Bunker but it is a start."
  fbh_its_begun:0 "Its Begun"
  fbh_its_begun_desc:0 "The NCR and Legion are finally at war, we'll need to move quickly."
  #legion support
  fbh_greater_devil:0 "The Greater Devil"
  fbh_greater_devil_desc:0 "The Legion is certainly no friend of the Brotherhood especially with the fall of the Maxson expedition but they might be the best chance we have of reclaiming Lost Hills."
  fbh_legion_negotiations:0 "Legion Negotiations"
  fbh_legion_negotiations_desc:0 "Caesar is a simple man at heart, he wants men or money so we should trade money for survivors of the Maxson expedition."
  fbh_remarkable_tribesmen:0 "The Remarkable Tribe"
  fbh_remarkable_tribesmen_desc:0 "The only tribe Caesar hasn't incorporated has done well for itself, we can learn about animal handling from them."
  fbh_war_paint:0 "War Paint"
  fbh_war_paint_desc:0 "The Navajo can teach us much about warfare, their perspective is much different from ours."
  fbh_grand_metalworks:0 "Grand Metalworks"
  fbh_grand_metalworks_desc:0 "While their forges are currently small and preoccupied with making silver for the legion they can squeeze in a few kilns for some of our lighter production work."
  fbh_kickstart_my_heart:0 "Kickstart My Heart"
  fbh_kickstart_my_heart_desc:0 "We found some advanced rocket launchers in a pre-war army convoy marked with Hopeville, while we should seize these we can't get them out, we should tip them off and see if they appreciate the information."
  fbh_cult_of_personality:0 "Cult OF Personality"
  fbh_cult_of_personality_desc:0 "A functioning GECK in the middle of arizona? we could do marvelous things with if we managed to get it to Florida, it would be up to the discretion of Chieh Hashkeh if we could take it without a fight."
  fbh_likeminded_savages:0 "Likeminded Savages"
  fbh_likeminded_savages_desc:0 "The Iron Alliance are  very simple people but they have been crafting their own power armour we could pay for a few models to examine."
  fbh_children_with_weapons:0 "Children With Weapons"
  fbh_children_with_weapons_desc:0 "They are at least competent in fighting if not craftsmanship, a paltry amount of basic weapons might cool tensions."
  fbh_steel_showdown:0 "Steel Showdown"
  fbh_steel_showdown_desc:0 "It did not."
  fbh_understanding_not_respect:0 "Understanding Not Respect"
  fbh_understanding_not_respect_desc:0 "They might have lost the violent tension boiling point but we should both have a silent understanding."
  fbh_filthy_abominations:0 "Filthy abominations"
  fbh_filthy_abominations_desc:0 "There's an entire facility full of these creatures and they were trying to invent new ones."
  fbh_stay_home:0 "Stay Home"
  fbh_stay_home_desc:0 "While we have no current option but to accept these creatures as necessary for Caesar we can make use of them to deport any we find in our own lands."
  fbh_strange_factors:0 "Strange Benefactors"
  fbh_strange_factors_desc:0 "Despite the alarmingly fast collapse of the Texas chapter they felt the need to seal this laboratory from the super mutants but it does benefit us if we can spare the men to go and open it."
  fbh_fort_hood:0 "Fort Hood"
  fbh_fort_hood_desc:0 "Fort Hood was suprisingly in good condition when we found it the preliminary defences being intact is a good sign though."
  fbh_true_power:0 "Real Power"
  fbh_true_power_desc:0 "The workshops in the lower levels of the facility were all reduced to slag, presumably to keep the mutants from using them to build weapons but behind fake walls lies preserved advanced equipment."
  #end of the tree
  fbh_california_dreamin:0 "California Dreamin'"
  fbh_california_dreamin_desc:0 "Brotherhood of Steel forces have left their bunkers and are on a full offensive on Legion forces."
  fbh_hidden_cache:0 "The Hidden Cache"
  fbh_hidden_cache_desc:0 "We've found the last of the small arms caches in Florida, it isn't quite enough for a full division but it will be a nice boost."
  fbh_over_there:0 "Over There Over There"
  fbh_over_there_desc:0 "We should make provisions to increase the number of divisions available in the fight."
  fbh_ad_victoriam:0 "Ad Victoriam"
  fbh_ad_victoriam_desc:0 "They will not break us, They will break upon us!."
  fbh_gimme_shelter:0 "Gimme Shelter"
  fbh_gimme_shelter_desc:0 "Shatter their Resolve."
  fbh_running_gun_blues:0 "Running Gun Blues"
  fbh_running_gun_blues_desc:0 "Kill them all! God will understand."
  fbh_back_in_black:0 "Back In Black"
  fbh_back_in_black_desc:0 "I got nine lives, Cat's eyes, Abusin' every one of them and running wild."
  fbh_we_are_legion:0 " We Are Legion"
  fbh_we_are_legion_desc:0 "We are Legion, for we are many."
  fbh_one_final_effort:0 "One Final Effort"
  fbh_one_final_effort_desc:0 "We have one last Wave of Paladins we can deploy."
  fbh_red_alert:0 "Red Alert"
  fbh_red_alert_desc:0 "A full sized nuclear warhead has been found and recovered."
  fbh_command_and_conquer:0 "Command & Conquer"
  fbh_command_and_conquer_desc:0 "Mr. President, a second Nuke has been found."
  fbh_phantom_pain:0 "Phantom Pain"
  fbh_phantom_pain_desc:0 "you gon' wait."
  fbh_et_tu_brute:0 "Et Tu, Brute?"
  fbh_et_tu_brute_desc:0 "Sic Semper Tyrannis."
  fbh_lore_slightly_accurate_ending:0 "I'm Not Paying Taxes"
  fbh_lore_slightly_accurate_ending_desc:0 "I gave up a while ago incase you didn't see but do send help meme is forcing me to play advance wars in his basement."