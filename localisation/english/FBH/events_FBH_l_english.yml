l_english:
## Events
  # 
  nf_fbh.1.t:0 "The Heat Here is Unbarable."
  nf_fbh.1.d:0 "This swamp filled hellhole is almost unlivable but we should have enough space for now to set up the equipment we could evacuate but what should we prioritise?"
  nf_fbh.1.a:0 "The arms workshops"
  nf_fbh.1.b:0 "The construction materials"
  nf_fbh.2.t:0 "Cross Country Marches"
  nf_fbh.2.d:0 "The march from California into Arizona and across in the south east to avoid Legion forces has left almost all of forces in no position to do anything, they have no option but to rest."
  nf_fbh.2.a:0 "Rest while we can, Brothers"
  nf_fbh.3.t:0 "Fall of the Lost Hills Bunker"
  nf_fbh.3.d:0 "It was a long almost silent war with the NCR that simmered over time but the final defeat came quickly with troopers and rangers storming the bunker, Jonathan Maxson stayed behind in his deathly state to cut down waves of troopers and make sure enough of us could evacuate south and leave California along the coast but now his memory should be put to rest as we rebuild."
  nf_fbh.3.a:0 "Rest easy, Jonathan, Angharad knows what he's doing."
  nf_fbh.4.t:0 "Raiders are a Uninversal Problem"
  nf_fbh.4.d:0 "The first weeks here were realatively peaceful, maybe the raiders just hadn't done enough drugs to attempt anything yet but they came at us, we hunted them down and ended them all but the exertion was painful in such a delicate state."
  nf_fbh.4.a:0 "We must hold on!"
  nf_fbh.5.t:0 "Political Debates, Again"
  nf_fbh.5.d:0 "While everyone respects Angharad for guiding us as best as he could to Florida there's some that think others could do better, everyone agrees Llwyd shouldn't be trusted though."
  nf_fbh.5.a:0 "Angharad is influential"
  nf_fbh.5.b:0 "Llwyd somehow makes a good point"
  nf_fbh.5.b_tt:0 "This might anger some of the hardline anti-NCR Brothers"
  nf_fbh.5.c:0 "Rhiannon dominates talks"
  nf_fbh.5.e:0 "Mari becomes influential"
  nf_fbh.6.t:0 "Llwyd The Snake"
  nf_fbh.6.d:0 "Llwyd has proposed his own exile given his pro-NCR stances, we think this is best altough a bullet might be better for him"
  nf_fbh.6.a:0 "Angharad convinces Llwyd's followers"
  nf_fbh.6.b:0 "Rhiannon convinces Llwyd's followers"
  nf_fbh.6.c:0 "Mari convinces Llwyd's followers"
  nf_fbh.7.t:0 "Scientific Struggles"
  nf_fbh.7.d:0 "Our scribes could either dedicate more of the time in their schedule to researching technologies or to developing vital resources we would need for construction, we just need to pick which one we need them to focus on.
  nf_fbh.7.a:0 "Research"
  nf_fbh.7.b:0 "Resources"
  nf_fbh.8.t:0 "Elder Promotion"
  nf_fbh.8.d:0 "We can firmly choose the leader for the Chapter, we can always replace them if they prove incompetent"
  nf_fbh.8.a:0 "As Expected"
  nf_fbh.9.t:0 "I Don't Want to Set The World on Fire"
  nf_fbh.9.d:0 "There's clearly something much larger brewing between the NCR and Legion we have to be ready to observe or intervene and for that we will require a much greater amount understanding of long range communication."
  nf_fbh.9.a:0 "I love science"
  nf_fbh.10.t:0 "The Devil You Know"
  nf_fbh.10.d:0 "The Brotherhood has sent us an envoy, we were almost certain they had been wiped out after the battle in the Mojave but if they want to cooperate why not?"
  nf_fbh.10.a:0 "Tax them"
  nf_fbh.10.b:0 "No Taxes, yet"
  nf_fbh.11.t:0 "The Devil You Don't"
  nf_fbh.11.d:0 "The Brotherhood has sent us an envoy, we were almost certain they had been wiped out after the battle in Colorado but if they want to cooperate why not?"
  nf_fbh.11.a:0 "Collect Tribute"
  nf_fbh.11.b:0 "No Tribute, yet"
  nf_fbh.12.t:0 "Maxson Expedition Exchage"
  nf_fbh.12.d:0 "The loss of the budding colorado chapter was a surprise but we now have an audience with Caesar and we can bargain for the release of anyone that survived."
  nf_fbh.12.a:0 "Scribes only"
  nf_fbh.12.b:0 "All of them"
  nf_fbh.12.c:0 "None"
  nf_fbh.13.t:0 "Vault 47"
  nf_fbh.13.d:0 "The Scribes of the eastern Brothers say they found a vault and were attempting to extract the GECK from deep inside, they've admitted fault and now wait on the Chief's decision about if we should keep it or let them have it."
  nf_fbh.13.a:0 "We'll keep it"
  nf_fbh.13.b:0 "naakai dineʼé éí hólǫ́"
  
  nf_fbh.15.t:0 "Tempered Steel"
  nf_fbh.15.d:0 "The Skirmish with the Brotherhood at least has exposed some vital flaws in out power armour production methods that we can fix, we have also managed to observe how the Brotherhood operates in their camps and we can learn to live like them if it makes life easier."
  nf_fbh.15.a:0 "Vital Understanding"
  nf_fbh.16.t:0 "Exiled Ghouls"
  nf_fbh.16.d:0 "Florida has extreme views against out kind but at least for now they've chosen the mutually benficial route of deporting their ghouls to us, Caesar has a few that he wants to stop being in public view too."
  nf_fbh.16.a:0 "Find them a bed and some water"
  nf_fbh.17.t:0 "Storm of Steel"
  nf_fbh.17.d:0 "The Brotherhood forces are leaving their bunkers and assaulting Legion troops wherever they are encountered, they are also nwo directly in the war rather than as a proxy."
  nf_fbh.17.a:0 "About time"
  nf_fbh.18.t:0 "Stronger Than Iron"
  nf_fbh.18.d:0 "He tried to make me pay taxes."
  nf_fbh.18.a:0 "understandable"
  nf_fbh.19.t:0 "Mojave Chapter"
  nf_fbh.19.d:0 "The Mojave Chapter has lifted their lockdown and deployed Paladins to aid us."
  nf_fbh.19.a:0 "Thanks. I guess?"
  nf_fbh.20.t:0 "Elder Return"
  nf_fbh.20.d:0 "The Florida Chapter wants to discuss us returning the corpse of Jonathan Maxson to them."
  nf_fbh.20.a:0 "sure"
  nf_fbh.20.b:0 "Absolutely not"
  nf_fbh.21.t:0 "Colorado Chapter"
  nf_fbh.21.d:0 "The Colorado Chapter has come out of hiding and deployed Paladins to aid the Iron Alliance."
  nf_fbh.21.a:0 "Thanks. I guess?"